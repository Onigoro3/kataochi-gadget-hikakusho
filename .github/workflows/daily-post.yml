name: Daily Auto Post (Angel - 型落ちガジェット比較所)

# 毎日 JST 10:05 に自動実行(UTC 1:05 = JST 10:05)。
# Dragon(型落ち家電ラボ, JST 9:05)と実行時刻をずらし、部署対抗上の実行タイミングの
# 混同・依存を避ける。実行時刻はGitHub Actionsのベストエフォートのため数分〜のズレが生じ得る点に留意。
# 2026-07-15: GitHub公式ドキュメントが「毎時0分ちょうど(hour boundary)に集中する
# スケジュールは高負荷時に遅延・スキップされやすい」と明記しているため、分を0から
# 5へずらして負荷集中を避ける(SA全体点検で本日10:00分の実行が記録されていないことを
# 確認したことを受けた予防的対応)。
on:
  schedule:
    - cron: "5 1 * * *"
  workflow_dispatch: {}  # 手動実行・動作確認用

permissions:
  contents: read  # 2026-07-17: トピック/価格履歴の永続化先をSupabaseへ移行したため、
                  # git commit権限は不要になった(sa_common/supabase_store.py参照)

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run auto-post pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-5
          HATENA_ID: ${{ secrets.HATENA_ID }}
          HATENA_BLOG_DOMAIN: ${{ secrets.HATENA_BLOG_DOMAIN }}
          HATENA_API_KEY: ${{ secrets.HATENA_API_KEY }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python main.py

      # 実行失敗時の通知拡張ポイント:
      # ここに「if: failure()」ステップを追加し、Discord Webhook等へ通知するステップを
      # 挟むと、実行失敗をGitHub Actionsのログ以外でも即座に検知できるようになる。
      # 例:
      # - name: Notify failure to Discord
      #   if: failure()
      #   run: |
      #     curl -H "Content-Type: application/json" \
      #       -d '{"content":"Angel Daily Auto Post が失敗しました。Actionsログを確認してください。"}' \
      #       ${{ secrets.DISCORD_WEBHOOK_URL }}
